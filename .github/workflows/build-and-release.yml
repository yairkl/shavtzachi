name: Build and Release

on:
  push:
    branches:
      - master
      - 'release/*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Create credentials and config files
        shell: bash
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run Tests
        run: |
          python -m pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage Report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run Build Script
        run: python build.py

      - name: Rename Executables
        shell: python
        run: |
          import os, sys
          src = "dist/shavtzachi.exe" if sys.platform == "win32" else "dist/shavtzachi"
          
          if sys.platform == "win32":
              dst = "dist/shavtzachi-windows.exe"
          elif sys.platform == "darwin":
              dst = "dist/shavtzachi-macos"
          else:
              dst = "dist/shavtzachi-linux"
              
          os.rename(src, dst)

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: executable-${{ matrix.os }}
          path: dist/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-tmp
          merge-multiple: true

      - name: Create or Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest Release"
          artifacts: "dist-tmp/*"
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: "Automated rolling build of the latest version of Shavtzachi."
